<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Groom with PawMax — Premium Pet Grooming Slots</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --c1:#2D7FF9;       /* azure (logo top) */
  --c2:#1730B8;       /* indigo (logo bottom) */
  --c-mid:#5B9CFC;
  --c-light:#E5EEFF;
  --c-soft:#F2F6FF;
  --c-ink:#0F1E47;
  --c-gray:#5B6A87;
  --c-line:#E2E8F4;
  --grad:linear-gradient(135deg,#2D7FF9 0%,#1730B8 100%);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:'Plus Jakarta Sans','Nunito',Segoe UI,sans-serif;color:var(--c-ink);background:#fff;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(900px 500px at 110% -10%,#DDE6FF 0%,transparent 60%),radial-gradient(700px 400px at -10% 30%,#E5EEFF 0%,transparent 60%),#fff;}
img,svg{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--c1);box-shadow:0 0 0 3px rgba(45,127,249,.18)}
a{color:inherit;text-decoration:none}

/* Layout */
.container{max-width:1180px;margin:0 auto;padding:0 24px}

/* Nav */
.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--c-line)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:24px}
.brand{display:flex;align-items:center;gap:12px}
.brand-name{font-weight:800;font-size:20px;letter-spacing:-.4px}
.brand-name b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.nav-links{display:flex;gap:28px}
.nav-links a{font-weight:600;font-size:14px;color:var(--c-gray);transition:.15s}
.nav-links a:hover{color:var(--c1)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:30px;border:none;font-weight:800;font-size:14px;transition:.18s;letter-spacing:.2px}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 8px 22px rgba(45,127,249,.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 26px rgba(45,127,249,.45)}
.btn-ghost{background:#fff;color:var(--c1);border:1.5px solid var(--c-light)}
.btn-ghost:hover{border-color:var(--c1)}
@media (max-width:760px){.nav-links{display:none}}

/* Hero */
.hero{padding:80px 0 60px;position:relative;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:48px;align-items:center}
.hero h1{font-size:60px;line-height:1.05;letter-spacing:-1.5px;margin:0 0 18px;font-weight:800}
.hero h1 span{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{font-size:17px;line-height:1.6;color:var(--c-gray);margin:0 0 28px;max-width:520px}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap}
.hero-trust{display:flex;gap:32px;margin-top:36px;flex-wrap:wrap}
.hero-trust div{font-size:12px;color:var(--c-gray);font-weight:600}
.hero-trust b{display:block;font-size:24px;color:var(--c-ink);font-weight:800}
.hero-art{position:relative;height:480px;display:flex;align-items:center;justify-content:center}
.hero-art .blob{position:absolute;background:var(--grad);opacity:.13;border-radius:50%;filter:blur(40px)}
.hero-art .blob-1{width:340px;height:340px;top:40px;right:40px}
.hero-art .blob-2{width:240px;height:240px;bottom:20px;left:20px;background:#5B9CFC}
.hero-card{position:relative;background:#fff;border-radius:28px;padding:30px;box-shadow:0 30px 80px rgba(23,48,184,.18);border:1px solid var(--c-line);width:100%;max-width:380px;z-index:2}
.hero-card-pet{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.hero-card-avatar{width:56px;height:56px;border-radius:18px;background:var(--c-light);display:flex;align-items:center;justify-content:center;font-size:30px}
.hero-card-pet h4{margin:0;font-size:17px;font-weight:800}
.hero-card-pet span{font-size:12px;color:var(--c-gray);font-weight:600}
.hero-card-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--c-line);font-size:14px}
.hero-card-row:last-of-type{border:none}
.hero-card-row b{color:var(--c1)}
.hero-card-cta{margin-top:18px;width:100%;justify-content:center}
.hero-pill{position:absolute;background:#fff;padding:10px 16px;border-radius:30px;box-shadow:0 12px 30px rgba(23,48,184,.2);font-size:12px;font-weight:800;display:flex;align-items:center;gap:8px;z-index:3}
.hero-pill-1{top:60px;left:-10px}
.hero-pill-2{bottom:80px;right:-20px}
.hero-pill .dot{width:8px;height:8px;border-radius:50%;background:#22B07D;box-shadow:0 0 0 4px rgba(34,176,125,.18)}
@media (max-width:920px){.hero{padding:48px 0}.hero-grid{grid-template-columns:1fr;gap:24px}.hero h1{font-size:42px}.hero-art{height:380px}}

/* Section */
.section{padding:80px 0}
.section h2{font-size:38px;line-height:1.1;letter-spacing:-1px;font-weight:800;margin:0 0 14px;text-align:center}
.section h2 span{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.section .sub{text-align:center;color:var(--c-gray);font-size:16px;margin:0 auto 48px;max-width:620px;line-height:1.6}
.eyebrow{display:inline-block;padding:6px 14px;border-radius:30px;background:var(--c-light);color:var(--c1);font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase}
.eyebrow-wrap{text-align:center;margin-bottom:14px}

/* Services */
.svc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.svc{background:#fff;border:1px solid var(--c-line);border-radius:22px;padding:28px 22px;transition:.2s;cursor:pointer;position:relative;overflow:hidden}
.svc:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(23,48,184,.12);border-color:var(--c-mid)}
.svc-icon{width:54px;height:54px;border-radius:16px;background:var(--c-light);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:18px}
.svc h3{margin:0 0 6px;font-size:18px;font-weight:800}
.svc p{margin:0 0 16px;font-size:13px;color:var(--c-gray);line-height:1.5}
.svc-foot{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid var(--c-line)}
.svc-price{font-weight:800;font-size:18px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.svc-time{font-size:12px;color:var(--c-gray);font-weight:600}
.svc.selected{border-color:var(--c1);box-shadow:0 12px 28px rgba(45,127,249,.2)}
.svc.selected::after{content:"\2713";position:absolute;top:14px;right:14px;width:26px;height:26px;border-radius:50%;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px}
@media (max-width:920px){.svc-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:520px){.svc-grid{grid-template-columns:1fr}}

/* Booking widget */
.booking{background:linear-gradient(180deg,var(--c-soft) 0%,#fff 100%);padding:80px 0;border-top:1px solid var(--c-line);border-bottom:1px solid var(--c-line)}
.book-card{background:#fff;border-radius:28px;padding:36px;box-shadow:0 30px 80px rgba(23,48,184,.1);border:1px solid var(--c-line)}
.steps{display:flex;justify-content:space-between;margin-bottom:32px;position:relative}
.steps::before{content:"";position:absolute;top:18px;left:8%;right:8%;height:2px;background:var(--c-line);z-index:0}
.step{display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1;flex:1}
.step-circle{width:36px;height:36px;border-radius:50%;background:#fff;border:2px solid var(--c-line);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--c-gray);transition:.2s}
.step.active .step-circle{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 6px 16px rgba(45,127,249,.4)}
.step.done .step-circle{background:var(--c1);border-color:var(--c1);color:#fff}
.step-label{font-size:12px;font-weight:700;color:var(--c-gray)}
.step.active .step-label,.step.done .step-label{color:var(--c1)}

.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
@media (max-width:600px){.row{grid-template-columns:1fr}}
.field label{display:block;font-size:12px;font-weight:700;color:var(--c-gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;border:1.5px solid var(--c-line);border-radius:12px;font-size:14px;color:var(--c-ink);background:#fff;transition:.15s}
.field textarea{resize:vertical;min-height:80px}

.day-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:18px}
.day-row::-webkit-scrollbar{display:none}
.day{flex-shrink:0;padding:14px 18px;border:1.5px solid var(--c-line);border-radius:14px;background:#fff;text-align:center;cursor:pointer;min-width:70px;transition:.15s}
.day:hover{border-color:var(--c-mid)}
.day.active{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 8px 20px rgba(45,127,249,.35)}
.day-name{font-size:11px;font-weight:700;opacity:.75}
.day-num{font-size:22px;font-weight:800;margin-top:2px}

.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media (max-width:520px){.time-grid{grid-template-columns:repeat(3,1fr)}}
.time{padding:12px;border:1.5px solid var(--c-line);border-radius:12px;background:#fff;font-size:14px;font-weight:700;color:var(--c-ink);cursor:pointer;transition:.15s}
.time:hover:not(:disabled){border-color:var(--c1);color:var(--c1)}
.time.active{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 6px 16px rgba(45,127,249,.35)}
.time:disabled{background:var(--c-soft);color:#B0BCD0;cursor:not-allowed;text-decoration:line-through}

.summary{background:var(--c-soft);border:1px solid var(--c-line);border-radius:18px;padding:22px;margin-top:8px}
.summary h4{margin:0 0 14px;font-size:15px;font-weight:800;letter-spacing:.3px}
.sum-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--c-line);font-size:14px;color:var(--c-gray)}
.sum-row:last-of-type{border:none;padding-top:14px;font-weight:800;color:var(--c-ink);font-size:17px}
.sum-row b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}

.actions{display:flex;justify-content:space-between;margin-top:28px;gap:12px}
.actions .right{margin-left:auto}

/* Why */
.why-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
@media (max-width:920px){.why-grid{grid-template-columns:repeat(2,1fr)}}
.why{padding:24px;text-align:center;border-radius:20px;background:#fff;border:1px solid var(--c-line);transition:.2s}
.why:hover{transform:translateY(-3px);box-shadow:0 16px 32px rgba(23,48,184,.1)}
.why-icon{width:60px;height:60px;border-radius:18px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;box-shadow:0 8px 18px rgba(45,127,249,.3)}
.why h4{margin:0 0 6px;font-size:16px;font-weight:800}
.why p{margin:0;font-size:13px;color:var(--c-gray);line-height:1.5}

/* Reviews */
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media (max-width:820px){.rev-grid{grid-template-columns:1fr}}
.rev{background:#fff;border:1px solid var(--c-line);border-radius:22px;padding:26px}
.rev-stars{color:#FFB547;margin-bottom:12px;font-size:16px;letter-spacing:2px}
.rev p{margin:0 0 18px;font-size:14px;line-height:1.6;color:var(--c-ink)}
.rev-who{display:flex;align-items:center;gap:12px}
.rev-avatar{width:42px;height:42px;border-radius:50%;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800}
.rev-who b{display:block;font-size:14px}
.rev-who span{font-size:12px;color:var(--c-gray)}

/* CTA */
.cta-band{margin:60px 0;padding:48px 36px;border-radius:28px;background:var(--grad);color:#fff;text-align:center;box-shadow:0 30px 60px rgba(23,48,184,.3);position:relative;overflow:hidden}
.cta-band::before,.cta-band::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.12)}
.cta-band::before{width:200px;height:200px;top:-60px;right:-60px}
.cta-band::after{width:150px;height:150px;bottom:-50px;left:-30px}
.cta-band h3{margin:0 0 10px;font-size:32px;font-weight:800;letter-spacing:-.5px;position:relative}
.cta-band p{margin:0 0 24px;opacity:.92;position:relative;font-size:15px}
.cta-band .btn{background:#fff;color:var(--c1);position:relative}

/* Footer */
.footer{padding:48px 0 32px;border-top:1px solid var(--c-line);background:var(--c-soft)}
.foot-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:32px;margin-bottom:32px}
@media (max-width:760px){.foot-grid{grid-template-columns:1fr 1fr;gap:24px}}
.foot-grid h5{margin:0 0 14px;font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.foot-grid a{display:block;padding:6px 0;font-size:13px;color:var(--c-gray);transition:.15s}
.foot-grid a:hover{color:var(--c1)}
.foot-about p{font-size:13px;color:var(--c-gray);line-height:1.6;max-width:280px}
.foot-bottom{padding-top:24px;border-top:1px solid var(--c-line);display:flex;justify-content:space-between;font-size:12px;color:var(--c-gray);flex-wrap:wrap;gap:12px}

/* Live status strip */
.live-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:#fff;border-radius:22px;border:1px solid var(--c-line);box-shadow:0 12px 30px rgba(23,48,184,.08);overflow:hidden;margin-bottom:48px}
.live-strip > div{padding:22px 18px;display:flex;align-items:center;gap:14px;border-right:1px solid var(--c-line)}
.live-strip > div:last-child{border-right:none}
.live-icon{width:46px;height:46px;border-radius:14px;background:var(--c-light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.live-strip b{display:block;font-size:18px;font-weight:800;color:var(--c-ink);line-height:1}
.live-strip span{font-size:11px;color:var(--c-gray);font-weight:600;display:block;margin-top:4px;letter-spacing:.2px}
.live-pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22B07D;animation:pulseDot 1.6s infinite;margin-right:6px;vertical-align:middle}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(34,176,125,.6)}50%{box-shadow:0 0 0 8px rgba(34,176,125,0)}}
@media (max-width:820px){.live-strip{grid-template-columns:repeat(2,1fr)}.live-strip > div:nth-child(2){border-right:none}.live-strip > div:nth-child(1),.live-strip > div:nth-child(2){border-bottom:1px solid var(--c-line)}}
@media (max-width:480px){.live-strip{grid-template-columns:1fr}.live-strip > div{border-right:none;border-bottom:1px solid var(--c-line)}.live-strip > div:last-child{border-bottom:none}}

/* How it works */
.how-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;position:relative}
@media (max-width:920px){.how-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:520px){.how-grid{grid-template-columns:1fr}}
.how-step{text-align:center;position:relative}
.how-num{width:64px;height:64px;border-radius:20px;background:#fff;border:2px solid var(--c-line);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;margin:0 auto 16px;background:var(--grad);color:#fff;box-shadow:0 10px 24px rgba(45,127,249,.35);position:relative;z-index:2}
.how-step h4{margin:0 0 6px;font-size:17px;font-weight:800}
.how-step p{margin:0;font-size:13px;color:var(--c-gray);line-height:1.5}
.how-step::after{content:"→";position:absolute;top:24px;right:-18px;color:var(--c-mid);font-size:24px;font-weight:900;opacity:.5}
.how-step:last-child::after{display:none}
@media (max-width:920px){.how-step::after{display:none}}

/* Groomers */
.gr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
@media (max-width:920px){.gr-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:480px){.gr-grid{grid-template-columns:1fr}}
.groomer{background:#fff;border:1px solid var(--c-line);border-radius:22px;padding:22px;text-align:center;transition:.2s}
.groomer:hover{transform:translateY(-4px);box-shadow:0 18px 36px rgba(23,48,184,.12);border-color:var(--c-mid)}
.gr-avatar{width:90px;height:90px;border-radius:50%;background:var(--grad);color:#fff;font-size:38px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 10px 24px rgba(45,127,249,.35)}
.groomer h4{margin:0 0 4px;font-size:16px;font-weight:800}
.groomer .role{font-size:12px;color:var(--c1);font-weight:700;margin-bottom:10px}
.groomer .bio{font-size:12px;color:var(--c-gray);line-height:1.5;margin-bottom:12px}
.gr-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.gr-tag{font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;background:var(--c-soft);color:var(--c1);letter-spacing:.3px;text-transform:uppercase}
.gr-stars{color:#FFB547;font-size:13px;margin-bottom:8px;letter-spacing:1.5px}

/* Membership */
.plus-card{display:grid;grid-template-columns:1.3fr 1fr;gap:36px;align-items:center;background:var(--grad);color:#fff;border-radius:32px;padding:48px;box-shadow:0 30px 70px rgba(23,48,184,.35);position:relative;overflow:hidden}
.plus-card::before,.plus-card::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.1)}
.plus-card::before{width:280px;height:280px;top:-120px;right:-80px}
.plus-card::after{width:200px;height:200px;bottom:-100px;left:30%}
@media (max-width:820px){.plus-card{grid-template-columns:1fr;padding:32px;gap:24px}}
.plus-badge{display:inline-block;padding:6px 14px;border-radius:30px;background:rgba(255,255,255,.2);font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:14px}
.plus-card h3{margin:0 0 12px;font-size:36px;font-weight:800;letter-spacing:-1px;line-height:1.1;position:relative}
.plus-card .plus-sub{font-size:15px;opacity:.92;margin-bottom:22px;position:relative;line-height:1.5}
.plus-list{list-style:none;padding:0;margin:0;display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;font-size:14px;position:relative}
@media (max-width:520px){.plus-list{grid-template-columns:1fr}}
.plus-list li{padding-left:28px;position:relative;line-height:1.4}
.plus-list li::before{content:"✓";position:absolute;left:0;top:0;width:20px;height:20px;border-radius:50%;background:#fff;color:var(--c1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
.plus-pricing{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:24px;padding:30px;text-align:center;backdrop-filter:blur(8px);position:relative}
.plus-price{font-size:54px;font-weight:900;letter-spacing:-2px;line-height:1}
.plus-price small{font-size:18px;font-weight:600;opacity:.85}
.plus-pricing .save{font-size:12px;font-weight:700;opacity:.9;margin-top:4px;letter-spacing:.5px}
.plus-cta{margin-top:18px;width:100%;justify-content:center;background:#fff !important;color:var(--c1) !important}

/* FAQ */
.faq-wrap{max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.faq{background:#fff;border:1px solid var(--c-line);border-radius:16px;overflow:hidden;transition:.2s}
.faq.open{border-color:var(--c-mid);box-shadow:0 12px 28px rgba(23,48,184,.08)}
.faq summary{padding:18px 22px;font-size:15px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;list-style:none}
.faq summary::-webkit-details-marker{display:none}
.faq summary::after{content:"+";font-size:22px;color:var(--c1);font-weight:300;transition:.2s}
.faq.open summary::after{transform:rotate(45deg)}
.faq .ans{padding:0 22px 20px;font-size:14px;color:var(--c-gray);line-height:1.6}

/* WhatsApp FAB */
.wa-fab{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:#22B07D;color:#fff;border:none;cursor:pointer;box-shadow:0 12px 30px rgba(34,176,125,.5);font-size:30px;display:flex;align-items:center;justify-content:center;z-index:80;transition:.2s;animation:floaty 3s ease-in-out infinite}
.wa-fab:hover{transform:scale(1.08)}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.wa-fab .wa-tip{position:absolute;right:72px;top:50%;transform:translateY(-50%);background:#0F1E47;color:#fff;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;white-space:nowrap;opacity:0;pointer-events:none;transition:.2s}
.wa-fab:hover .wa-tip{opacity:1}

/* Nature videos */
.vids-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
@media (max-width:920px){.vids-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:520px){.vids-grid{grid-template-columns:1fr}}
.vid-card{position:relative;border-radius:22px;overflow:hidden;aspect-ratio:9/14;cursor:pointer;box-shadow:0 14px 32px rgba(23,48,184,.18);transition:.3s;background:#000}
.vid-card:hover{transform:translateY(-5px);box-shadow:0 22px 44px rgba(23,48,184,.28)}
.vid-card video{width:100%;height:100%;object-fit:cover;display:block}
.vid-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.7) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:18px;color:#fff;pointer-events:none}
.vid-overlay h4{margin:0 0 4px;font-size:17px;font-weight:800;letter-spacing:-.3px}
.vid-overlay span{font-size:12px;opacity:.9;font-weight:600;display:flex;align-items:center;gap:6px}
.vid-tag{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.92);color:var(--c-ink);font-size:10px;font-weight:800;padding:5px 12px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase;backdrop-filter:blur(6px)}
.vid-mute{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:.2s}
.vid-mute:hover{background:rgba(0,0,0,.8);transform:scale(1.08)}

/* Top promo banner */
.promo{background:var(--grad);color:#fff;padding:10px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;letter-spacing:.2px;position:relative;overflow:hidden}
.promo .promo-pets{display:flex;gap:-8px;align-items:center}
.promo .promo-pet{width:28px;height:28px;border-radius:50%;border:2px solid #fff;overflow:hidden;margin-left:-10px;box-shadow:0 4px 10px rgba(0,0,0,.18);background:#fff}
.promo .promo-pet:first-child{margin-left:0}
.promo .promo-pet img{width:100%;height:100%;object-fit:cover;display:block}
.promo b{background:rgba(255,255,255,.22);padding:3px 10px;border-radius:20px;font-weight:800;font-size:12px;letter-spacing:.5px}
.promo .promo-close{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:.8;line-height:1}
.promo .promo-close:hover{opacity:1}
@media (max-width:600px){.promo{font-size:12px;padding:10px 36px 10px 14px;gap:10px}.promo .promo-pet{width:24px;height:24px}}

/* Pet imagery */
.pet-img{width:100%;height:100%;object-fit:cover;border-radius:inherit}

/* Floating pet bubbles in hero */
.pet-bubble{position:absolute;border-radius:50%;overflow:hidden;border:4px solid #fff;box-shadow:0 14px 30px rgba(23,48,184,.25);z-index:3;background:#fff}
.pet-bubble img{width:100%;height:100%;object-fit:cover;display:block}
.pet-b1{width:88px;height:88px;top:30px;left:-10px;animation:floaty 4s ease-in-out infinite}
.pet-b2{width:72px;height:72px;bottom:60px;right:-20px;animation:floaty 5s ease-in-out infinite reverse}
.pet-b3{width:60px;height:60px;top:200px;left:-30px;animation:floaty 6s ease-in-out infinite}
@media (max-width:920px){.pet-b3{display:none}}

/* Pet gallery */
.gallery{display:grid;grid-template-columns:repeat(8,1fr);gap:12px;grid-auto-rows:120px}
@media (max-width:920px){.gallery{grid-template-columns:repeat(4,1fr)}}
@media (max-width:520px){.gallery{grid-template-columns:repeat(2,1fr);grid-auto-rows:140px}}
.gal-item{border-radius:18px;overflow:hidden;position:relative;cursor:pointer;transition:.3s;box-shadow:0 6px 18px rgba(23,48,184,.1)}
.gal-item:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 16px 36px rgba(23,48,184,.18)}
.gal-item img{width:100%;height:100%;object-fit:cover;display:block;transition:.4s}
.gal-item:hover img{transform:scale(1.08)}
.gal-tag{position:absolute;bottom:8px;left:8px;background:rgba(255,255,255,.92);color:var(--c-ink);font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;letter-spacing:.3px;backdrop-filter:blur(6px)}
.gal-wide{grid-column:span 2;grid-row:span 2}
.gal-tall{grid-row:span 2}
@media (max-width:520px){.gal-wide,.gal-tall{grid-column:auto;grid-row:auto}}

/* Service icon as pet image */
.svc-pet{position:absolute;top:14px;right:14px;width:42px;height:42px;border-radius:50%;overflow:hidden;border:2px solid #fff;box-shadow:0 4px 12px rgba(23,48,184,.15)}
.svc-pet img{width:100%;height:100%;object-fit:cover}

/* Newsletter */
.news{background:linear-gradient(135deg,var(--c-soft) 0%,#fff 60%);border:1px solid var(--c-line);border-radius:26px;padding:40px;text-align:center;margin-top:48px}
.news h3{margin:0 0 8px;font-size:26px;font-weight:800;letter-spacing:-.5px}
.news p{margin:0 0 20px;color:var(--c-gray);font-size:14px}
.news-form{display:flex;gap:8px;max-width:440px;margin:0 auto;flex-wrap:wrap}
.news-form input{flex:1;min-width:200px;padding:14px 18px;border-radius:30px;border:1.5px solid var(--c-line);font-size:14px}

/* Success modal */
.modal{position:fixed;inset:0;background:rgba(15,30,71,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-card{background:#fff;border-radius:28px;padding:42px;max-width:460px;width:100%;text-align:center;animation:pop .35s ease both;box-shadow:0 40px 80px rgba(23,48,184,.4)}
.modal-icon{width:88px;height:88px;border-radius:50%;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:46px;margin:0 auto 20px;box-shadow:0 16px 32px rgba(45,127,249,.4)}
.modal h3{margin:0 0 8px;font-size:26px;font-weight:800}
.modal p{margin:0 0 24px;color:var(--c-gray);line-height:1.6}
.modal .summary{text-align:left;margin-bottom:20px}
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

/* ---- Pet image library (Unsplash CDN) ---- */
const PET_IMG = {
  dog1: "https://images.unsplash.com/photo-1561037404-61cd46aa615b?w=400&h=400&fit=crop",
  dog2: "https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=400&h=400&fit=crop",
  dog3: "https://images.unsplash.com/photo-1583337130417-3346a1be7dee?w=400&h=400&fit=crop",
  dog4: "https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=400&h=400&fit=crop",
  dog5: "https://images.unsplash.com/photo-1517423440428-a5a00ad493e8?w=400&h=400&fit=crop",
  cat1: "https://images.unsplash.com/photo-1574144611937-0df059b5ef3e?w=400&h=400&fit=crop",
  cat2: "https://images.unsplash.com/photo-1592194996308-7b43878e84a6?w=400&h=400&fit=crop",
  cat3: "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=400&h=400&fit=crop",
  cat4: "https://images.unsplash.com/photo-1543852786-1cf6624b9987?w=400&h=400&fit=crop",
  groom: "https://images.unsplash.com/photo-1601758228041-f3b2795255f1?w=600&h=600&fit=crop",
  bunny: "https://images.unsplash.com/photo-1535241749838-299277b6305f?w=400&h=400&fit=crop",
};

/* ---- PawMax Logo (matches reference image) ---- */
function PLogo({ size = 38 }) {
  const id = "plg" + size;
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
      <defs>
        <linearGradient id={id} x1="0.1" y1="0.05" x2="0.95" y2="0.95">
          <stop offset="0" stopColor="#2D7FF9" />
          <stop offset="1" stopColor="#1730B8" />
        </linearGradient>
      </defs>
      <path d="M22 30 Q22 22 30 22 L46 22 Q62 22 62 38 Q62 54 46 54 L36 54 L36 84 Q36 88 32 88 L26 88 Q22 88 22 84 Z M36 34 L36 42 L44 42 Q48 42 48 38 Q48 34 44 34 Z" fill={`url(#${id})`} />
      <ellipse cx="56" cy="20" rx="7" ry="9" fill={`url(#${id})`} />
      <ellipse cx="80" cy="36" rx="11" ry="9" fill={`url(#${id})`} transform="rotate(20 80 36)" />
      <ellipse cx="78" cy="62" rx="10" ry="11" fill={`url(#${id})`} transform="rotate(-15 78 62)" />
    </svg>
  );
}

/* ---- Data ---- */
const SERVICES = [
  { id: "bath",    name: "Bath & Brush",    desc: "Deep cleanse, blow-dry & brush out", icon: "🛁", price: 899,  time: "60 min", tag: "Popular"   },
  { id: "groom",   name: "Full Groom",      desc: "Bath + breed-style haircut",         icon: "✂️", price: 1399, time: "90 min", tag: "Bestseller"},
  { id: "spa",     name: "Pawfect Spa",     desc: "Full groom + aromatherapy + de-shed",icon: "🌿", price: 1999, time: "120 min",tag: "Premium"   },
  { id: "nails",   name: "Nail & Paw Care", desc: "Trim, file & paw balm",              icon: "🐾", price: 349,  time: "20 min", tag: "Quick"     },
];

const TIMES = ["09:00","10:00","11:00","12:00","14:00","15:00","16:00","17:00","18:00","19:00"];
const BUSY  = ["11:00","15:00"];

const DAYS = (() => {
  const arr = [];
  const today = new Date();
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    arr.push({
      label: i === 0 ? "Today" : d.toLocaleDateString("en", { weekday: "short" }),
      num: d.getDate(),
      iso: d.toISOString().slice(0,10),
    });
  }
  return arr;
})();

const PET_TYPES = [
  { id: "dog", label: "Dog", icon: "🐕" },
  { id: "cat", label: "Cat", icon: "🐈" },
  { id: "rabbit", label: "Rabbit", icon: "🐇" },
];

const REVIEWS = [
  { name: "Riya K.",   pet: "Bruno (Lab)",        text: "Bruno came back smelling amazing and so calm! Best grooming experience ever." },
  { name: "Aakash D.", pet: "Misty (Persian)",    text: "PawMax groomers are gentle and patient. Misty hates baths but came home happy!" },
  { name: "Priya M.",  pet: "Cooper (Golden)",    text: "Booked the spa + nail trim. Cooper looked like a show dog. Worth every rupee!" },
];

/* ---- App ---- */
function App() {
  const [step, setStep] = useState(0);
  const [service, setService] = useState(null);
  const [day, setDay] = useState(DAYS[1].iso);
  const [time, setTime] = useState(null);
  const [petName, setPetName] = useState("");
  const [petType, setPetType] = useState("dog");
  const [breed, setBreed] = useState("");
  const [ownerName, setOwnerName] = useState("");
  const [phone, setPhone] = useState("");
  const [notes, setNotes] = useState("");
  const [confirmed, setConfirmed] = useState(false);
  const [showPromo, setShowPromo] = useState(true);

  const selected = SERVICES.find(s => s.id === service);
  const dayObj = DAYS.find(d => d.iso === day);

  const canNext = [
    !!service,
    !!time,
    petName.trim() && breed.trim(),
    ownerName.trim() && phone.trim().length >= 10,
  ];

  function scrollToBooking() {
    document.getElementById("booking")?.scrollIntoView({ behavior: "smooth" });
  }

  function reset() {
    setStep(0); setService(null); setTime(null);
    setPetName(""); setBreed(""); setOwnerName(""); setPhone(""); setNotes("");
    setConfirmed(false);
  }

  const stepLabels = ["Service", "Schedule", "Pet", "Confirm"];

  return (
    <>
      {/* Top promo banner */}
      {showPromo && (
        <div className="promo">
          <div className="promo-pets">
            <div className="promo-pet"><img src={PET_IMG.dog1} alt="" /></div>
            <div className="promo-pet"><img src={PET_IMG.cat2} alt="" /></div>
            <div className="promo-pet"><img src={PET_IMG.dog3} alt="" /></div>
          </div>
          <span>🐾 First groom? Get <b>20% OFF</b> with code <b>PAWMAX20</b> — ends Sunday!</span>
          <button className="promo-close" onClick={() => setShowPromo(false)} aria-label="Dismiss">×</button>
        </div>
      )}

      {/* Nav */}
      <nav className="nav">
        <div className="container nav-inner">
          <div className="brand">
            <PLogo size={36} />
            <div className="brand-name">Groom with <b>PawMax</b></div>
          </div>
          <div className="nav-links">
            <a href="#services">Services</a>
            <a href="#booking">Book Slot</a>
            <a href="#why">Why Us</a>
            <a href="#reviews">Reviews</a>
          </div>
          <button className="btn btn-primary" onClick={scrollToBooking}>Book Now →</button>
        </div>
      </nav>

      {/* Hero */}
      <header className="hero">
        <div className="container hero-grid">
          <div>
            <span className="eyebrow">Premium Pet Grooming</span>
            <h1 style={{ marginTop: 14 }}>
              Where every paw gets <span>pampered</span> & every tail wags
            </h1>
            <p>
              Book trusted, certified groomers for your dog, cat or rabbit in just 60 seconds.
              Salon visit or doorstep service — your pet's spa day, your way.
            </p>
            <div className="hero-cta">
              <button className="btn btn-primary" onClick={scrollToBooking}>Book a Slot →</button>
              <a href="#services" className="btn btn-ghost">View Services</a>
            </div>
            <div className="hero-trust">
              <div><b>10K+</b>Happy pets</div>
              <div><b>4.9★</b>Avg rating</div>
              <div><b>68+</b>Locations</div>
              <div><b>100%</b>Certified</div>
            </div>
          </div>

          <div className="hero-art">
            <div className="blob blob-1" />
            <div className="blob blob-2" />
            <div className="pet-bubble pet-b1"><img src={PET_IMG.dog1} alt="Happy dog" /></div>
            <div className="pet-bubble pet-b2"><img src={PET_IMG.cat1} alt="Cute cat" /></div>
            <div className="pet-bubble pet-b3"><img src={PET_IMG.dog3} alt="Puppy" /></div>
            <div className="hero-card">
              <div className="hero-card-pet">
                <div className="hero-card-avatar" style={{ padding: 0, overflow: "hidden" }}><img src={PET_IMG.dog2} className="pet-img" alt="Bruno" /></div>
                <div>
                  <h4>Spa Day</h4>
                  <span>Saturday • 11:00 AM</span>
                </div>
              </div>
              <div className="hero-card-row"><span>Service</span><span>Full Groom</span></div>
              <div className="hero-card-row"><span>Groomer</span><span>Anita S.</span></div>
              <div className="hero-card-row"><span>Duration</span><span>90 min</span></div>
              <div className="hero-card-row"><span>Total</span><b>₹1,399</b></div>
              <button className="btn btn-primary hero-card-cta" onClick={scrollToBooking}>Reserve a Slot</button>
            </div>
          </div>
        </div>
      </header>

      {/* Services */}
      <section className="section" id="services">
        <div className="container">
          <div className="eyebrow-wrap"><span className="eyebrow">Our Services</span></div>
          <h2>Tail-wagging <span>treatments</span></h2>
          <p className="sub">From quick nail trims to full spa days — handcrafted packages for every pet, every breed, every mood.</p>
          <div className="svc-grid">
            {SERVICES.map((s, i) => (
              <div key={s.id}
                className={"svc" + (service === s.id ? " selected" : "")}
                onClick={() => { setService(s.id); setStep(0); }}>
                <div className="svc-icon">{s.icon}</div>
                <div className="svc-pet"><img src={[PET_IMG.dog4, PET_IMG.cat2, PET_IMG.dog5, PET_IMG.cat3][i]} alt="" /></div>
                <h3>{s.name}</h3>
                <p>{s.desc}</p>
                <div className="svc-foot">
                  <span className="svc-price">₹{s.price}</span>
                  <span className="svc-time">⏱ {s.time}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* How It Works */}
      <section className="section" id="how" style={{ paddingTop: 0 }}>
        <div className="container">
          <div className="eyebrow-wrap"><span className="eyebrow">How It Works</span></div>
          <h2>From booking to <span>belly rubs</span> in 4 steps</h2>
          <p className="sub">No phone calls, no waitlists. Just pick, schedule, and let us pamper.</p>
          <div className="how-grid">
            {[
              { n: "1", t: "Choose service", d: "Pick from bath, full groom, spa or nail care" },
              { n: "2", t: "Pick a slot",    d: "Live availability across 7 days, 10 time slots" },
              { n: "3", t: "Add pet info",   d: "Tell us about your fur baby's quirks & preferences" },
              { n: "4", t: "Relax",          d: "We confirm via SMS, you sit back. Spa day arrives!" },
            ].map(s => (
              <div key={s.n} className="how-step">
                <div className="how-num">{s.n}</div>
                <h4>{s.t}</h4>
                <p>{s.d}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Booking */}
      <section className="booking" id="booking">
        <div className="container">
          <div className="eyebrow-wrap"><span className="eyebrow">Book Your Slot</span></div>
          <h2>Pick a time that <span>works for you</span></h2>
          <p className="sub">4 quick steps. Free reschedule up to 4 hours before. No charges till your pet arrives.</p>

          {/* Live status strip */}
          <div className="live-strip" style={{ maxWidth: 820, margin: "0 auto 36px" }}>
            <div>
              <div className="live-icon">⚡</div>
              <div><b><span className="live-pulse" />24 slots</b><span>Free today</span></div>
            </div>
            <div>
              <div className="live-icon">⭐</div>
              <div><b>4.9 / 5</b><span>From 8,200+ reviews</span></div>
            </div>
            <div>
              <div className="live-icon">⏱️</div>
              <div><b>~60 sec</b><span>Avg booking time</span></div>
            </div>
            <div>
              <div className="live-icon">💬</div>
              <div><b>&lt; 1 min</b><span>Support response</span></div>
            </div>
          </div>

          <div className="book-card" style={{ maxWidth: 820, margin: "0 auto" }}>
            <div className="steps">
              {stepLabels.map((label, i) => (
                <div key={i} className={"step " + (i === step ? "active" : i < step ? "done" : "")}>
                  <div className="step-circle">{i < step ? "✓" : i + 1}</div>
                  <div className="step-label">{label}</div>
                </div>
              ))}
            </div>

            {/* Step 0: Service */}
            {step === 0 && (
              <div>
                <div className="svc-grid">
                  {SERVICES.map(s => (
                    <div key={s.id}
                      className={"svc" + (service === s.id ? " selected" : "")}
                      onClick={() => setService(s.id)}>
                      <div className="svc-icon">{s.icon}</div>
                      <h3>{s.name}</h3>
                      <p>{s.desc}</p>
                      <div className="svc-foot">
                        <span className="svc-price">₹{s.price}</span>
                        <span className="svc-time">⏱ {s.time}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Step 1: Schedule */}
            {step === 1 && (
              <div>
                <label style={{ fontSize: 12, fontWeight: 700, color: "var(--c-gray)", letterSpacing: ".5px", textTransform: "uppercase" }}>Choose a date</label>
                <div className="day-row" style={{ marginTop: 8 }}>
                  {DAYS.map(d => (
                    <button key={d.iso} type="button"
                      className={"day" + (day === d.iso ? " active" : "")}
                      onClick={() => setDay(d.iso)}>
                      <div className="day-name">{d.label}</div>
                      <div className="day-num">{d.num}</div>
                    </button>
                  ))}
                </div>
                <label style={{ fontSize: 12, fontWeight: 700, color: "var(--c-gray)", letterSpacing: ".5px", textTransform: "uppercase", display: "block", marginTop: 18, marginBottom: 8 }}>Pick a time</label>
                <div className="time-grid">
                  {TIMES.map(t => {
                    const busy = BUSY.includes(t);
                    return (
                      <button key={t} type="button" disabled={busy}
                        className={"time" + (time === t ? " active" : "")}
                        onClick={() => setTime(t)}>{t}</button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Step 2: Pet */}
            {step === 2 && (
              <div>
                <div className="row">
                  <div className="field">
                    <label>Pet name</label>
                    <input value={petName} onChange={e => setPetName(e.target.value)} placeholder="e.g. Bruno" />
                  </div>
                  <div className="field">
                    <label>Pet type</label>
                    <select value={petType} onChange={e => setPetType(e.target.value)}>
                      {PET_TYPES.map(p => <option key={p.id} value={p.id}>{p.icon} {p.label}</option>)}
                    </select>
                  </div>
                </div>
                <div className="row">
                  <div className="field">
                    <label>Breed</label>
                    <input value={breed} onChange={e => setBreed(e.target.value)} placeholder="e.g. Labrador" />
                  </div>
                  <div className="field">
                    <label>Notes for groomer (optional)</label>
                    <input value={notes} onChange={e => setNotes(e.target.value)} placeholder="Anxious, sensitive paws…" />
                  </div>
                </div>
              </div>
            )}

            {/* Step 3: Confirm */}
            {step === 3 && (
              <div>
                <div className="row">
                  <div className="field">
                    <label>Your name</label>
                    <input value={ownerName} onChange={e => setOwnerName(e.target.value)} placeholder="Full name" />
                  </div>
                  <div className="field">
                    <label>Phone</label>
                    <input value={phone} onChange={e => setPhone(e.target.value.replace(/[^0-9]/g, "").slice(0,10))} placeholder="10-digit mobile" />
                  </div>
                </div>
                <div className="summary">
                  <h4>Booking Summary</h4>
                  <div className="sum-row"><span>Service</span><span>{selected?.name || "—"}</span></div>
                  <div className="sum-row"><span>Date & time</span><span>{dayObj?.label} {dayObj?.num} • {time || "—"}</span></div>
                  <div className="sum-row"><span>Pet</span><span>{petName || "—"} • {breed || "—"}</span></div>
                  <div className="sum-row"><span>Duration</span><span>{selected?.time || "—"}</span></div>
                  <div className="sum-row"><span>Total payable</span><b>₹{selected?.price || 0}</b></div>
                </div>
              </div>
            )}

            {/* Actions */}
            <div className="actions">
              {step > 0 && <button className="btn btn-ghost" onClick={() => setStep(s => s - 1)}>← Back</button>}
              <button className="btn btn-primary right"
                disabled={!canNext[step]}
                style={{ opacity: canNext[step] ? 1 : .5, cursor: canNext[step] ? "pointer" : "not-allowed" }}
                onClick={() => {
                  if (!canNext[step]) return;
                  if (step === 3) {
                    // Send to backend if available; never block UX if it fails.
                    fetch("/api/bookings", {
                      method: "POST",
                      headers: { "Content-Type": "application/json" },
                      body: JSON.stringify({
                        service: selected?.name, date: day, time,
                        petName, petType, breed, notes,
                        ownerName, phone, price: selected?.price,
                      }),
                    }).then(r => r.json()).then(d => {
                      if (d?.booking?.id) console.log("Saved booking:", d.booking.id);
                    }).catch(() => {});
                    setConfirmed(true);
                  }
                  else setStep(s => s + 1);
                }}>
                {step === 3 ? "Confirm Booking 🐾" : "Continue →"}
              </button>
            </div>
          </div>
        </div>
      </section>

      {/* Why */}
      <section className="section" id="why">
        <div className="container">
          <div className="eyebrow-wrap"><span className="eyebrow">Why PawMax</span></div>
          <h2>Pet parents <span>love us</span></h2>
          <p className="sub">Built by pet lovers, certified by professionals, trusted by thousands of paws across India.</p>
          <div className="why-grid">
            {[
              { i: "🎓", t: "Certified groomers", d: "100% Fear-Free trained, 6-month in-house apprenticeship" },
              { i: "🛡️", t: "₹5L safety cover",   d: "Every pet is insured during their visit. Total peace of mind." },
              { i: "🚪", t: "Doorstep service",   d: "Full mobile spa van — we come to you, no commute stress" },
              { i: "↩️", t: "Free reschedule",   d: "Plans changed? Reschedule free up to 4 hours before" },
            ].map((w, i) => (
              <div key={i} className="why">
                <div className="why-icon">{w.i}</div>
                <h4>{w.t}</h4>
                <p>{w.d}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Pet Gallery */}
      <section className="section" id="gallery" style={{ paddingTop: 0 }}>
        <div className="container">
          <div className="eyebrow-wrap"><span className="eyebrow">Pet Gallery</span></div>
          <h2>Wagging tails & <span>happy faces</span></h2>
          <p className="sub">A peek into our daily spa days — real PawMax customers, fresh from their grooming sessions.</p>
          <div className="gallery">
            <div className="gal-item gal-wide"><img src={PET_IMG.dog1} alt="Golden retriever" /><span className="gal-tag">🐕 Golden • Full Groom</span></div>
            <div className="gal-item gal-tall"><img src={PET_IMG.cat2} alt="Persian cat" /><span className="gal-tag">🐱 Persian • Spa</span></div>
            <div className="gal-item"><img src={PET_IMG.dog3} alt="Puppy" /><span className="gal-tag">Puppy bath</span></div>
            <div className="gal-item"><img src={PET_IMG.cat1} alt="Tabby" /><span className="gal-tag">Cat groom</span></div>
            <div className="gal-item"><img src={PET_IMG.dog4} alt="Happy dog" /><span className="gal-tag">Bath & brush</span></div>
            <div className="gal-item gal-wide"><img src={PET_IMG.groom} alt="Grooming session" /><span className="gal-tag">✂️ Spa session</span></div>
            <div className="gal-item"><img src={PET_IMG.cat3} alt="Kitten" /><span className="gal-tag">Kitten care</span></div>
            <div className="gal-item"><img src={PET_IMG.dog5} alt="Pug" /><span className="gal-tag">🐶 Pug</span></div>
            <div className="gal-item"><img src={PET_IMG.cat4} alt="Gray cat" /><span className="gal-tag">Nail trim</span></div>
            <div className="gal-item"><img src={PET_IMG.bunny} alt="Bunny" /><span className="gal-tag">🐇 Bunny</span></div>
          </div>
        </div>
      </section>

      {/* Calming Nature Videos */}
      <section className="section" id="videos" style={{ paddingTop: 0 }}>
        <div className="container">
          <div className="eyebrow-wrap"><span className="eyebrow">Pet-Calming Library</span></div>
          <h2>Soothing <span>nature videos</span> for your pet</h2>
          <p className="sub">Anxious pup? Restless kitty? Play these vet-recommended nature scenes — calming sounds and visuals proven to relax pets at home or during grooming.</p>
          <div className="vids-grid">
            {[
              { src: "https://assets.mixkit.co/videos/preview/mixkit-forest-stream-in-the-sunlight-529-large.mp4",         tag: "Forest",   t: "Sunlit Stream",     d: "Gentle water flow" },
              { src: "https://assets.mixkit.co/videos/preview/mixkit-waves-in-the-water-1164-large.mp4",                    tag: "Ocean",    t: "Calm Waves",        d: "Rhythmic shoreline" },
              { src: "https://assets.mixkit.co/videos/preview/mixkit-pine-tree-tops-time-lapse-on-a-foggy-day-44284-large.mp4", tag: "Mountain", t: "Misty Pines",       d: "Foggy forest morning" },
              { src: "https://assets.mixkit.co/videos/preview/mixkit-aerial-view-of-a-sunny-meadow-with-clouds-30354-large.mp4", tag: "Meadow", t: "Sunny Meadow",     d: "Aerial cloud drift" },
            ].map((v, i) => (
              <NatureVideo key={i} v={v} />
            ))}
          </div>
        </div>
      </section>

      {/* Meet our groomers */}
      <section className="section" id="team" style={{ paddingTop: 0 }}>
        <div className="container">
          <div className="eyebrow-wrap"><span className="eyebrow">Our Team</span></div>
          <h2>Meet your <span>certified groomers</span></h2>
          <p className="sub">Hand-picked, internationally trained, and Fear-Free certified — the gentlest hands for your fur baby.</p>
          <div className="gr-grid">
            {[
              { name: "Anita Sharma", role: "Senior Groomer", bio: "12 yrs experience with breed-specific cuts and anxious pets.", tags: ["Breed cuts","Anxious pets"], rating: 5 },
              { name: "Rohan Mehta",  role: "Spa Specialist", bio: "Aromatherapy expert. Loves big dogs and Persian cats equally.", tags: ["Spa","De-shed"], rating: 5 },
              { name: "Sneha Kapoor", role: "Cat Whisperer",  bio: "Cat-only certified. Patience is her superpower.", tags: ["Cats","Senior pets"], rating: 5 },
              { name: "Vikram Das",   role: "Mobile Groomer", bio: "Doorstep service ace — brings the salon to your home.", tags: ["Home visit","Dogs"], rating: 5 },
            ].map(g => (
              <div key={g.name} className="groomer">
                <div className="gr-avatar">{g.name[0]}</div>
                <h4>{g.name}</h4>
                <div className="role">{g.role}</div>
                <div className="gr-stars">{"★".repeat(g.rating)}</div>
                <div className="bio">{g.bio}</div>
                <div className="gr-tags">
                  {g.tags.map(t => <span key={t} className="gr-tag">{t}</span>)}
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* PawMax Plus */}
      <section className="section" id="plus" style={{ paddingTop: 0 }}>
        <div className="container">
          <div className="plus-card">
            <div>
              <span className="plus-badge">👑 PawMax Plus</span>
              <h3>Save 15% on every groom, all year long</h3>
              <p className="plus-sub">The smart choice for pet parents who book regularly. Premium perks, priority slots, and a free monthly nail trim — all for less than one full groom.</p>
              <ul className="plus-list">
                <li>15% off every service</li>
                <li>2× Paw Points on bookings</li>
                <li>Priority booking slots</li>
                <li>Free monthly nail trim</li>
                <li>Free reschedule, anytime</li>
                <li>Dedicated support line</li>
              </ul>
            </div>
            <div className="plus-pricing">
              <div style={{ fontSize: 12, fontWeight: 700, opacity: .85, letterSpacing: 1, textTransform: "uppercase" }}>Monthly plan</div>
              <div className="plus-price" style={{ marginTop: 10 }}>₹299<small>/mo</small></div>
              <div className="save">Saves ₹210 per groom on average</div>
              <button className="btn plus-cta" onClick={scrollToBooking}>Get PawMax Plus →</button>
              <div style={{ fontSize: 11, opacity: .8, marginTop: 10 }}>Cancel anytime • No lock-in</div>
            </div>
          </div>
        </div>
      </section>

      {/* Reviews */}
      <section className="section" id="reviews" style={{ paddingTop: 0 }}>
        <div className="container">
          <div className="eyebrow-wrap"><span className="eyebrow">Reviews</span></div>
          <h2>Happy <span>pet parents</span></h2>
          <p className="sub">Real stories from real pet parents who chose PawMax for their fur babies.</p>
          <div className="rev-grid">
            {REVIEWS.map((r, i) => {
              const petPic = [PET_IMG.dog2, PET_IMG.cat2, PET_IMG.dog4][i];
              return (
                <div key={i} className="rev">
                  <div className="rev-stars">★★★★★</div>
                  <p>"{r.text}"</p>
                  <div className="rev-who">
                    <div className="rev-avatar" style={{ padding: 0, overflow: "hidden" }}><img src={petPic} className="pet-img" alt={r.pet} /></div>
                    <div><b>{r.name}</b><span>{r.pet}</span></div>
                  </div>
                </div>
              );
            })}
          </div>

          <div className="cta-band">
            <h3>Ready to pamper your pet?</h3>
            <p>Slots are filling fast — book in under a minute.</p>
            <button className="btn" onClick={scrollToBooking}>Book a Slot →</button>
          </div>
        </div>
      </section>

      {/* FAQ */}
      <section className="section" id="faq" style={{ paddingTop: 0 }}>
        <div className="container">
          <div className="eyebrow-wrap"><span className="eyebrow">FAQ</span></div>
          <h2>Got <span>questions?</span></h2>
          <p className="sub">Quick answers to what pet parents ask us most.</p>
          <div className="faq-wrap">
            {[
              { q: "Can I reschedule my booking?", a: "Absolutely — free reschedule up to 4 hours before your slot from the confirmation SMS or by calling support. No questions asked." },
              { q: "Are your groomers certified?",  a: "Every PawMax groomer holds an international grooming certification and completes a 6-month in-house apprenticeship before serving clients." },
              { q: "What if my pet is anxious or aggressive?", a: "We offer a free pre-grooming meet-and-greet, calming aromatherapy, and Fear-Free trained groomers. Just mention it in the booking notes." },
              { q: "Is doorstep service the same price?", a: "Doorstep service adds a flat ₹199 convenience fee. All other pricing remains the same as our salons." },
              { q: "How does PawMax Plus work?",     a: "For ₹299/month you get 15% off every groom, 2× Paw Points, free reschedules, priority slots, and a free monthly nail trim. Cancel anytime." },
              { q: "Do you handle cats and rabbits?", a: "Yes! We have specialist cat groomers and small-pet trained groomers. Just select the right pet type when booking." },
            ].map((f, i) => (
              <FaqItem key={i} q={f.q} a={f.a} />
            ))}
          </div>
          <div className="news">
            <h3>Get pet-care tips in your inbox</h3>
            <p>Monthly grooming guides, vet-approved tips, and exclusive PawMax discounts.</p>
            <form className="news-form" onSubmit={e => { e.preventDefault(); alert("Subscribed! 💙"); }}>
              <input type="email" placeholder="your@email.com" required />
              <button type="submit" className="btn btn-primary">Subscribe</button>
            </form>
          </div>
        </div>
      </section>

      {/* Footer */}
      <footer className="footer">
        <div className="container">
          <div className="foot-grid">
            <div className="foot-about">
              <div className="brand" style={{ marginBottom: 14 }}>
                <PLogo size={36} />
                <div className="brand-name">Groom with <b>PawMax</b></div>
              </div>
              <p>Premium pet grooming, trusted by 10,000+ pet parents. Certified groomers, doorstep service, and a wagging-tail guarantee.</p>
            </div>
            <div>
              <h5>Services</h5>
              <a>Bath & Brush</a><a>Full Groom</a><a>Pawfect Spa</a><a>Nail & Paw Care</a>
            </div>
            <div>
              <h5>Company</h5>
              <a>About us</a><a>Careers</a><a>Press</a><a>Contact</a>
            </div>
            <div>
              <h5>Support</h5>
              <a>Help center</a><a>Cancellation policy</a><a>Privacy</a><a>Terms</a>
            </div>
          </div>
          <div className="foot-bottom">
            <span>© 2026 PawMax. Made with 💙 for pet parents.</span>
            <span>📞 +91 98300-00001 • support@pawmax.in</span>
          </div>
        </div>
      </footer>

      {/* Floating WhatsApp button */}
      <button className="wa-fab" onClick={() => alert("Chat with us on WhatsApp: +91 98300-00001")} aria-label="Chat on WhatsApp">
        💬<span className="wa-tip">Need help? Chat now</span>
      </button>

      {/* Success Modal */}
      {confirmed && (
        <div className="modal" onClick={reset}>
          <div className="modal-card" onClick={e => e.stopPropagation()}>
            <div className="modal-icon">🎉</div>
            <h3>Booking Confirmed!</h3>
            <p>We can't wait to pamper <b>{petName}</b>. A confirmation has been sent to <b>{phone}</b>.</p>
            <div className="summary">
              <div className="sum-row"><span>Service</span><span>{selected?.name}</span></div>
              <div className="sum-row"><span>Date & time</span><span>{dayObj?.label} {dayObj?.num} • {time}</span></div>
              <div className="sum-row"><span>Pet</span><span>{petName} • {breed}</span></div>
              <div className="sum-row"><span>Total paid</span><b>₹{selected?.price}</b></div>
            </div>
            <button className="btn btn-primary" style={{ width: "100%", justifyContent: "center" }} onClick={reset}>Book Another 🐾</button>
          </div>
        </div>
      )}
    </>
  );
}

function NatureVideo({ v }) {
  const [muted, setMuted] = useState(true);
  const ref = React.useRef(null);
  return (
    <div className="vid-card" onClick={() => { const el = ref.current; if (!el) return; el.paused ? el.play() : el.pause(); }}>
      <video ref={ref} src={v.src} autoPlay muted={muted} loop playsInline preload="metadata" />
      <span className="vid-tag">{v.tag}</span>
      <button className="vid-mute" onClick={e => { e.stopPropagation(); setMuted(m => !m); }} aria-label="Toggle sound">
        {muted ? "🔇" : "🔊"}
      </button>
      <div className="vid-overlay">
        <h4>{v.t}</h4>
        <span>🌿 {v.d}</span>
      </div>
    </div>
  );
}

function FaqItem({ q, a }) {
  const [open, setOpen] = useState(false);
  return (
    <details className={"faq" + (open ? " open" : "")} open={open} onClick={e => e.preventDefault()}>
      <summary onClick={() => setOpen(o => !o)}>{q}</summary>
      {open && <div className="ans">{a}</div>}
    </details>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
